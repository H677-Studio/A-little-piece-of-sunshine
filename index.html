<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>heart.PROTOCOL</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; width: 100vw; height: 100vh; }

  /* Area Teks Hati */
  #canvas { position: fixed; inset: 0; opacity: 1; z-index: 1; }

  /* Elemen Kata "i love you" Kecil */
  .word {
    position: absolute; color: #ff2d55; font-family: 'Courier New', monospace;
    font-size: 11px; white-space: nowrap; opacity: 0; pointer-events: none;
    text-shadow: 0 0 8px rgba(255,45,85,0.6);
    transition: opacity 0.9s ease;
  }
  .word.bright {
    color: #ff6b8a; font-weight: bold;
    text-shadow: 0 0 12px rgba(255,45,85,0.9), 0 0 24px rgba(255,45,85,0.4);
  }

  /* Container Video di Tengah */
  .video-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: none;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    /* Efek fade-in transisi video (diatur 3 detik agar memudar bareng teks) */
    transition: opacity 3s ease;
  }

  /* Memotong Video Menjadi Bentuk Hati Sempurna */
  .heart-video {
    width: 180px;  
    height: 180px; 
    object-fit: cover;
    clip-path: path("M 90,30 C 90,30 72,0 36,0 C 16,0 0,16 0,38 C 0,70 36,104 90,144 C 144,104 180,70 180,38 C 180,16 164,0 144,0 C 108,0 90,30 90,30 Z");
  }
</style>
</head>
<body>

<div id="canvas"></div>

<div class="video-container" id="video-box">
  <video class="heart-video" autoplay loop muted playsinline>
    <source src="video.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

<script>
  const WORD  = "i love you";
  const COUNT = 330; 
  const words = [];

  // ── Francisca's exact heart formula ────────────────────────────
  function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
  function heartY(t) { return 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t); }

  // ── Generate posisi koordinat hati ────────────────────────────
  function getHeartPositions() {
    const W  = window.innerWidth;
    const H  = window.innerHeight;
    const cx = W / 2;
    const cy = H / 2;
    const scale = Math.min(W, H) * 0.025; // Skala agak lebar memberi ruang video di tengah

    const positions = [];
    Math.seedrandom = function(v) { return function() { v = Math.sin(v) * 10000; return v - Math.floor(v); }; };
    const random = Math.seedrandom(42); 

    for (let i = 0; i < COUNT; i++) {
      const t = (i / COUNT) * 2 * Math.PI;
      const jitterScale = scale * 0.12;
      const jx = (random() - 0.5) * jitterScale;
      const jy = (random() - 0.5) * jitterScale;

      positions.push({
        x: cx + heartX(t) * scale + jx,
        y: cy - heartY(t) * scale + jy
      });
    }
    return positions;
  }

  // ── Build elemen teks ke dalam canvas ──────────────────────────
  function buildWords() {
    const container = document.getElementById('canvas');
    const pos = getHeartPositions();

    for (let i = 0; i < COUNT; i++) {
      const el = document.createElement('div');
      el.className = 'word' + (Math.random() < 0.15 ? ' bright' : '');
      el.textContent = WORD;
      el.style.left    = (pos[i].x - 32) + 'px';
      el.style.top     = (pos[i].y - 6)  + 'px';
      el.style.opacity = '0';
      container.appendChild(el);
      words.push(el);
    }
  }

  // ── Fungsi kalkulasi ulang posisi saat layar di-resize ──────────
  function updatePositions() {
    const pos = getHeartPositions();
    for (let i = 0; i < COUNT; i++) {
      if (words[i]) {
        words[i].style.left = (pos[i].x - 32) + 'px';
        words[i].style.top  = (pos[i].y - 6)  + 'px';
      }
    }
  }

  // ── Fungsi memunculkan hati & video BARENGAN sejak awal ─────
  function animateHeartDirectly() {
    const shuffled = [...words].sort(() => Math.random() - 0.5);
    const totalDuration = 3200;

    // LANGSUNG pemicu fade-in video di sini agar berjalan berbarengan dengan mulainya teks
    document.getElementById('video-box').style.opacity = '1';

    shuffled.forEach(el => {
      setTimeout(() => {
        el.style.opacity = (0.45 + Math.random() * 0.55).toString();
      }, Math.random() * totalDuration);
    });

    // Jalankan efek kedap-kedip lembut setelah seluruh durasi fade-in selesai
    setTimeout(() => {
      words.forEach(el => { el.style.transition = 'opacity 2s ease'; });
      pulseGlow();
    }, totalDuration + 500);
  }

  function pulseGlow() {
    let dim = true;
    setInterval(() => {
      words.forEach(el => {
        const base = 0.4 + Math.random() * 0.5;
        el.style.opacity = dim ? (base * 0.5).toString() : base.toString();
      });
      dim = !dim;
    }, 2500);
  }

  window.addEventListener('resize', updatePositions);

  buildWords();
  animateHeartDirectly();
</script>
</body>
</html>
