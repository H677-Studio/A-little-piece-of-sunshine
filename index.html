<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love You</title>
    <style>
        /* Mengatur latar belakang hitam gelap khas kode pemrograman */
        body {
            margin: 0;
            padding: 0;
            background-color: #09090b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace; /* Gaya font kode */
            overflow: hidden;
        }

        /* Container utama pembentuk hati */
        .heart-container {
            position: relative;
            width: 500px;
            height: 450px;
            text-align: justify;
            word-break: break-all;
            font-size: 10px;
            font-weight: bold;
            line-height: 9px;
            color: #ff003c; /* Warna merah neon */
            text-shadow: 0 0 4px #ff003c, 0 0 12px #ff4d6d; /* Efek menyala/glow */
            user-select: none;
        }

        /* Trik CSS membuat bentuk lengkungan hati kiri dan kanan */
        .heart-container::before,
        .heart-container::after {
            content: "";
            width: 50%;
            height: 100%;
            float: left;
            shape-image-threshold: 0.5;
        }

        .heart-container::before {
            shape-outside: polygon(50% 0%, 100% 0%, 100% 35%, 60% 70%, 0% 100%, 0% 35%, 15% 10%);
            clip-path: polygon(50% 0%, 100% 0%, 100% 35%, 60% 70%, 0% 100%, 0% 35%, 15% 10%);
        }

        .heart-container::after {
            float: right;
            shape-outside: polygon(50% 0%, 0% 0%, 0% 35%, 40% 70%, 100% 100%, 100% 35%, 85% 10%);
            clip-path: polygon(50% 0%, 0% 0%, 0% 35%, 40% 70%, 100% 100%, 100% 35%, 85% 10%);
        }

        /* Teks utama "Love you." yang besar di bagian tengah */
        .center-text {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%)\;;
            font-family: 'Inter', sans-serif;
            font-size: 42px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255,255,255,0.6), 0 0 20px rgba(255,77,109,0.3);
            font-weight: 600;
            z-index: 10;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <!-- Teks besar di tengah -->
    <div class="center-text">Love you.</div>

    <!-- Teks kecil-kecil yang membentuk hati -->
    <div class="heart-container" id="heart">
        <!-- Teks akan diisi otomatis menggunakan JavaScript di bawah ini agar rapi -->
    </div>

    <script>
        // Mengisi container dengan tulisan "i love you" berulang-ulang sampai penuh berbentuk hati
        const container = document.getElementById('heart');
        const textToRepeat = "iloveyou ";
        
        // Kita ulang teksnya sebanyak 350 kali supaya membentuk pola hati yang padat
        container.innerHTML = textToRepeat.repeat(350);
    </script>

</body>
</html>
