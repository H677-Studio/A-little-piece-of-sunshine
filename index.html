<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>heart.PROTOCOL</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; width: 100vw; height: 100vh; }

  /* Tampilan Terminal Awal */
  #terminal {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start; padding: 60px;
    z-index: 10; background: #000; transition: opacity 1s ease;
  }
  .terminal-line { color: #fff; font-size: clamp(12px,2vw,16px); opacity: 0; margin-bottom: 10px; white-space: nowrap; }
  .terminal-line.system { color: #888; }
  .terminal-line.ready  { color: #ff2d55; }
  .terminal-line.msg    { color: #fff; font-style: italic; }

  #decrypt-btn {
    margin-top: 28px; padding: 10px 24px; border: 1.5px solid #ff2d55;
    background: transparent; color: #ff2d55; font-family: 'Courier New', monospace;
    font-size: 13px; letter-spacing: 2px; cursor: pointer; opacity: 0;
    transition: background 0.3s, color 0.3s;
  }
  #decrypt-btn:hover { background: #ff2d55; color: #000; }

  /* Area Teks Hati */
  #canvas { position: fixed; inset: 0; opacity: 0; transition: opacity 0.8s ease; }

  /* Elemen Kata "i love you" Kecil (Diam di tempat) */
  .word {
    position: absolute; color: #ff2d55; font-family: 'Courier New', monospace;
    font-size: 11px; white-space: nowrap; opacity: 0; pointer-events: none;
    text-shadow: 0 0 8px rgba(255,45,85,0.6);
    transition: opacity 0.9s ease;
  }
  .word.bright {
    color: #ff6b8a; font-weight: bold;
    text-shadow: 0 0 12px rgba(255,45,85,0.9), 0 0 24px rgba(255,45,85,0.4);
  }
</style>
</head>
<body>

<div id="terminal">
  <div class="terminal-line system" id="t1">[system] Initializing heart.PROTOCOL_v2.0 ...</div>
  <div class="terminal-line ready"  id="t2">[status] READY</div>
  <div class="terminal-line msg"    id="t3">&gt; One encrypted package found for you.</div>
  <button id="decrypt-btn" onclick="startHeart()">🔒 DECRYPT MESSAGE</button>
</div>

<div id="canvas"></div>

<script>
  const WORD  = "i love you";
  const COUNT = 300;
  const words = [];
  let isDecrypted = false;

  // terminal intro
  function showTerminal() {
    ['t1','t2','t3'].forEach((id, i) => {
      setTimeout(() => {
        const el = document.getElementById(id);
        if(el) {
          el.style.transition = 'opacity 0.6s ease';
          el.style.opacity = '1';
        }
      }, 600 + i * 700);
    });
    setTimeout(() => {
      const btn = document.getElementById('decrypt-btn');
      if(btn) {
        btn.style.transition = 'opacity 0.8s ease';
        btn.style.opacity = '1';
      }
    }, 2800);
  }

  // ── Francisca's exact heart formula ────────────────────────────
  function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
  function heartY(t) { return 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t); }

  // ── Generate posisi koordinat hati ────────────────────────────
  function getHeartPositions() {
    const W  = window.innerWidth;
    const H  = window.innerHeight;
    const cx = W / 2;
    const cy = H / 2;
    const scale = Math.min(W, H) * 0.022;

    const positions = [];
    Math.seedrandom = function(v) { return function() { v = Math.sin(v) * 10000; return v - Math.floor(v); }; };
    const random = Math.seedrandom(42); 

    for (let i = 0; i < COUNT; i++) {
      const t = (i / COUNT) * 2 * Math.PI;
      const jitterScale = scale * 0.18;
      const jx = (random() - 0.5) * jitterScale;
      const jy = (random() - 0.5) * jitterScale;

      positions.push({
        x: cx + heartX(t) * scale + jx,
        y: cy - heartY(t) * scale + jy
      });
    }
    return positions;
  }

  // ── Build elemen teks ke dalam canvas ──────────────────────────
  function buildWords() {
    const container = document.getElementById('canvas');
    const pos = getHeartPositions();

    for (let i = 0; i < COUNT; i++) {
      const el = document.createElement('div');
      el.className = 'word' + (Math.random() < 0.15 ? ' bright' : '');
      el.textContent = WORD;
      el.style.left    = (pos[i].x - 38) + 'px';
      el.style.top     = (pos[i].y - 6)  + 'px';
      el.style.opacity = '0';
      container.appendChild(el);
      words.push(el);
    }
  }

  // ── Fungsi kalkulasi ulang posisi saat layar di-resize ──────────
  function updatePositions() {
    const pos = getHeartPositions();
    for (let i = 0; i < COUNT; i++) {
      if (words[i]) {
        words[i].style.left = (pos[i].x - 38) + 'px';
        words[i].style.top  = (pos[i].y - 6)  + 'px';
      }
    }
  }

  // ── Klik decrypt → murni fade in satu-satu secara acak di tempat ─────
  function startHeart() {
    if (isDecrypted) return;
    isDecrypted = true;

    const terminal = document.getElementById('terminal');
    terminal.style.opacity = '0';
    setTimeout(() => { terminal.style.display = 'none'; }, 1000);

    document.getElementById('canvas').style.opacity = '1';

    // Acak urutan tampil teks agar efek kemunculannya dramatis
    const shuffled = [...words].sort(() => Math.random() - 0.5);
    const totalDuration = 3200;

    shuffled.forEach(el => {
      setTimeout(() => {
        el.style.opacity = (0.45 + Math.random() * 0.55).toString();
      }, Math.random() * totalDuration);
    });

    // Jalankan efek kedap-kedip lembut setelah seluruh teks muncul
    setTimeout(() => {
      words.forEach(el => { el.style.transition = 'opacity 2s ease'; });
      pulseGlow();
    }, totalDuration + 1000);
  }

  function pulseGlow() {
    let dim = true;
    setInterval(() => {
      words.forEach(el => {
        const base = 0.4 + Math.random() * 0.5;
        el.style.opacity = dim ? (base * 0.5).toString() : base.toString();
      });
      dim = !dim;
    }, 2500);
  }

  window.addEventListener('resize', updatePositions);

  buildWords();
  showTerminal();
</script>
</body>
</html>
