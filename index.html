<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Heart Canvas</title>
    <style>
        /* Mengatur tampilan layar penuh dan latar belakang hitam */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        body { 
            background: #000; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        canvas { 
            display: block; 
        }
    </style>
</head>
<body>

    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");

        // Mengatur ukuran canvas sesuai ukuran layar browser
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let angle = 0;
        const NUM_STEPS = 70;
        const SCALE = 12; // Ukuran hati (bisa kamu besarkan/kecilkan di sini)
        const TEXT = "I love you";

        // Rumus matematika matematika untuk koordinat X dan Y bentuk hati
        function heartX(t) { 
            return 16 * Math.pow(Math.sin(t), 3); 
        }
        
        function heartY(t) { 
            return 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t); 
        }

        // Fungsi animasi untuk menggambar teks berbentuk hati
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            ctx.font = "bold 11px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // Melakukan perulangan untuk memunculkan teks di sepanjang garis hati
            for (let i = 0; i < NUM_STEPS; i++) {
                // Menghitung sudut untuk setiap teks
                let t = (i / NUM_STEPS) * Math.PI * 2 + angle;
                
                // Menentukan posisi koordinat X dan Y berdasarkan rumus hati
                let x = cx + heartX(t) * SCALE;
                let y = cy - heartY(t) * SCALE; // Dikurang (-) supaya posisi hatinya tidak terbalik

                // Efek warna gradasi merah-pink menyala
                let alpha = 0.3 + 0.7 * Math.sin(t + angle);
                ctx.fillStyle = `rgba(255, 20, 147, ${alpha})`;
                ctx.shadowColor = "rgba(255, 0, 100, 1)";
                ctx.shadowBlur = 10;

                // Gambar teks "I love you" di koordinat tersebut
                ctx.fillText(TEXT, x, y);
            }

            // Membuat hatinya berputar pelan secara otomatis
            angle += 0.005; 
            requestAnimationFrame(draw);
        }

        // Jalankan fungsi animasi
        draw();

        // Biar ukuran canvas otomatis menyesuaikan kalau layar di-resize atau HP dimiringkan
        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
